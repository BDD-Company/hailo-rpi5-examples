# TEST-ONLY config for the single-imx477 bench box (192.168.0.7).
# Production config.yaml stays 2-camera; this one exists so the Stage-A latency
# work can boot the app on a box that currently has ONE camera (imx477 on
# sensor 0) and only the NV12 HEF. Pass with: app.py --config <this file>.
# Keep in sync with config.yaml for non-camera/non-inference sections.

confidence_min: 0.4
confidence_move: 0.3

aim_point: [0.5, 0.5]
aim_point_max_offset: [0.5, 0.6]

target_size_m: [2, 2]

follow_target_position_ned: false

inference:
  hef_model_path: /home/bdd/models/2026-04-07_11n_ball_v2.hef
  nms_score_threshold: 0.3
  nms_iou_threshold: 0.45

thrust:
  cruise: 0.53
  hover: 0.4
  min: 0.4
  max: 0.9
  dynamic: false
  proportional_to_distance:
    enabled: true
    far_coeff: 1
    medium_distance_m: 20
    medium_coeff: 0.9
    near_distance_m: 10
    near_coeff: 1.1

target_lost:
  repeat_same_commands_frames: 1
  fade_per_frame: 0.99
  clear_estimator_history_after_frames: 3

estimation:
  estimation_3d:
    enabled: true
    method: numpy
    use_initial_velocity: false
  lookahead:
    frames: 1
    dynamic: true
    dynamic_frames_max: 5
    dynamic_sqrt: false
    dynamic_factor: 0.1
    dynamic_frames_near: 0
    dynamic_frames_medium: 0
    dynamic_frames_far: 0

optical_refinement:
  enabled: true
  adjust_aim_point_at_edge_of_frame: true
  adjust_aim_point_at_edge_of_frame_threshold: 0.01
  adjust_aim_point_at_edge_of_frame_max_size: 0.25

pd_coeff:
  p: [8, 2]
  d: 0
  p_min: [0.5, 0.5]
  p_max: [4, 2]
  p_dynamic: false
  p_dynamic_use_piecewise: false
  p_dynamic_min_target_size: 0.0005
  p_dynamic_min: 0.6
  p_dynamic_max_target_size: 0.0120
  p_dynamic_max: 6
  p_dynamic_stage_1_threshold: 0.01
  p_dynamic_stage_2_threshold: 0.05
  p_dynamic_stage_1_ratio: 1
  p_dynamic_stage_2_ratio: 1
  p_dynamic_stage_3_ratio: 1

takeoff:
  delay_until_n_detection_frames: 10
  duration_ns: 1000000000
  pd_coeff_p: [0.1, 0.1]
  thrust: 1.0

# Single camera: imx477 on sensor 0 (the only camera on the bench box).
camera:
  width: 1280
  height: 720
  fps: 30
  video_format: RGB
  active_id: 0
  switch_to_wide_size: 0.25
  switch_to_zoom_size: 0.015
  # Stage-A: auto-estimate exposure over ~1s, then pin it (clamped). Shutter
  # capped at 10ms (protects 30fps/latency); gain may rise to 16x to stay bright.
  autoexposure:
    exposure_auto_pin_s: 0.5
    exposure_min_us: 0
    exposure_max_us: 10000
    gain_max: 16.0
    exposure_time_us: 0
    analogue_gain: 0.0
  buffer_count: 2          # Stage-A: floor DMA pool depth
  cameras:
    - camera_id: 0
      name: imx477
      sensor_index: 0
      frame_angular_size_deg: [14, 8]

drone:
  connection_string: usb
  config:
    upside_down_angle_deg: 130
    upside_down_hold_s: 0.2
    use_set_attitude: false
    min_lift_fraction: 0.1
    lift_velocity_headroom_ms: 3.0
    lift_accel_headroom_mss: 5.0
    belly_down_yaw: true
    belly_down_yaw_kp: 1.5
    belly_down_yaw_max_rate_deg_s: 90.0
    belly_down_min_horizontal_g_mss: 2.0

bytetrack:
  enabled: false
  track_thresh: 0.3
  det_thresh: 0.35
  match_thresh: 0.3
  track_buffer: 30
  frame_rate: 30
  match_max_dist: 0.2
  recovery_max_dist: null
  nms_thresh: 0.3
  nms_dist_thresh: 0.06
