# Runtime configuration for the BDD application.
# Parsed and validated into config.Config (see config.py). Field types and
# their bounds are enforced at load time; unknown keys are reported as errors.
# XY values are written as [x, y].

confidence_min: 0.4
confidence_move: 0.3

aim_point: [0.5, 0.5]
aim_point_max_offset: [0.5, 0.6]

# target_size_m: [0.2, 0.2]    # balloon
target_size_m: [2, 2]          # large balloon
# target_size_m: [1.2, 1.2]    # shahed small
# target_size_m: [3.5, 2.5]    # shahed large

follow_target_position_ned: false

# Record the camera feed to ./_DEBUG/RAW_*.mkv (software x264enc, ~1 CPU core).
# Set false (or pass --no-record) to free CPU for inference/tiling.
record_videos: false

# Hailo inference: detection model + NMS post-processing. hef_model_path must
# point to an EXISTING .hef on the machine running the app (deployed under
# /home/bdd/models on the Pi; absent on dev hosts). labels_json is optional.
inference:
  hef_model_path: /home/bdd/models/2026-06-02_red-plate_v3.2_NV12+H8.hef
  nms_score_threshold: 0.3
  nms_iou_threshold: 0.45
  # labels_json: /home/bdd/models/labels.json

# Inference tiling. Whole-frame (1×1) is the default and the lowest-latency path;
# tiling splits each frame into a tiles_x×tiles_y grid (one inference per tile) for
# better small-object recall at distance, at the cost of latency (~N×15 ms on
# Hailo-8 — only ~2 tiles stay under the ~200 ms control budget). CLI --tiles and
# --switch-tiles override these (mutually exclusive). Omit the whole block for defaults.
tiling:
  # Tile grid. With switchable/auto_switch on (below) this is the geometry of the TILE
  # branch; the other branch is always whole-frame. 1×1 here would be a degenerate tile
  # branch, so it is promoted to 2×1.
  tiles_x: 2
  tiles_y: 1
  # Fractional tile overlap on both axes (0 <= overlap < 1); 0 = abutting tiles. >0
  # recovers objects straddling a tile seam. Only applied when tiling is active.
  overlap: 0.0
  # IoU above which the tile aggregator merges two detections from adjacent tiles.
  # Lower = dedup seam-straddling objects more eagerly. Tiled path only.
  tile_iou_threshold: 0.4

  # Runtime-switchable tiling: build BOTH a whole-frame branch and a tiles_x×tiles_y
  # branch behind valves + an input-selector, hot-switchable at runtime. Implied by
  # auto_switch and by start_on_tiling, so it does not need to be set separately.
  switchable: false

  # Boot on the TILE branch instead of whole-frame (implies switchable). The first frames
  # are inferred at 2×1 tiling's small-object recall, so a distant target is acquired
  # sooner; the policy then drops to whole-frame once it is locked (locked_frames_to_whole
  # below). Costs latency until then — 2×1 StageB ~28ms vs ~13ms whole-frame.
  # `--tiles NxM` on the CLI forces a static grid and ignores this (use `--tiles 1x1` for
  # a plain whole-frame-only run).
  start_on_tiling: true

  # Automatic detection-state policy (implies switchable): switch to tiling after
  # `lost_frames_to_tile` CONSECUTIVE frames with no confident target (reacquire
  # small/distant objects), and back to whole-frame after `locked_frames_to_whole`
  # confident frames (restore low latency). "Confident" = detection confidence
  # >= switch_conf. 20 confident frames is ~0.7s at the ~28fps this rig delivers.
  #
  # The two streaks treat a bad frame differently, on purpose:
  #   - lost streak: a single confident frame RESETS it. One real sighting means the
  #     target is not lost, so don't pay tiling's latency to go looking for it.
  #   - lock streak: a miss SUBTRACTS `locked_streak_miss_penalty` (floor 0) instead of
  #     resetting. Resetting would demand `locked_frames_to_whole` hits in an unbroken
  #     row, which a detector that misses even occasionally never delivers — and since
  #     start_on_tiling boots us ON the tile branch, the rig would sit at the higher
  #     latency until the detection got lucky. With miss rate m the streak drifts by
  #     (1-m) - m*P per frame; below m = 1/(1+P) the drift is positive and the return is
  #     prompt, above it it happens only by chance. Simulated time to leave the tile
  #     branch (locked=20, 28fps), old reset rule vs P=2:
  #       17% misses: 9.1s -> 1.4s   25%: 27.3s -> 2.5s   40%: never -> 19.4s
  #     P=0 ignores misses entirely; P >= locked_frames_to_whole restores reset-on-miss.
  auto_switch: true
  lost_frames_to_tile: 10
  locked_frames_to_whole: 20
  locked_streak_miss_penalty: 2
  switch_conf: 0.4

  # Post-switch watchdog (switchable tiling only). The handover already refuses to move
  # onto a branch that never warms up; this catches a branch that warms up and LATER dies
  # — app_callback stops firing and the control loop starves. No callback for
  # stall_timeout_s while tiling is active => revert to whole-frame, then refuse to
  # re-enter tiling for stall_cooldown_s (else the policy rebuilds its lost-streak in
  # ~0.7s and dives straight back into the dead branch).
  stall_timeout_s: 2.0
  stall_cooldown_s: 30.0

thrust:
  cruise: 0.9
  hover: 0.5
  min: 0.4
  max: 0.95

  dynamic: false
  # Optional sub-section: set `enabled: false` to disable (section still validated).
  proportional_to_distance:
    enabled: true
    far_coeff: 1
    medium_distance_m: 20
    medium_coeff: 0.9
    near_distance_m: 10
    near_coeff: 1.1

target_lost:
  repeat_same_commands_frames: 1   # keep emitting last command for this many lost frames before fading
  fade_per_frame: 0.99
  clear_estimator_history_after_frames: 3

estimation:
  # Optional sub-section: set `enabled: false` to disable 3D estimation.
  estimation_3d:
    enabled: true
    method: numpy
    use_initial_velocity: false

  lookahead:
    frames: 1
    dynamic: true
    dynamic_frames_max: 5
    dynamic_sqrt: false
    dynamic_factor: 0.1
    dynamic_frames_near: 0
    dynamic_frames_medium: 0
    dynamic_frames_far: 0   # can't be too big -- estimation will be too FAR away.

optical_refinement:
  enabled: true   # set false to disable the feature (section is still validated)
  adjust_aim_point_at_edge_of_frame: true
  adjust_aim_point_at_edge_of_frame_threshold: 0.01
  adjust_aim_point_at_edge_of_frame_max_size: 0.25   # w*h, e.g. w=0.5, h=0.5, size=0.25

pd_coeff:
  p: [8, 2]          # per-axis P gain (x, y)
  d: 0
  p_min: [0.5, 0.25]
  p_max: [4, 2]

  # Dynamically adjust P coeff based on target size.
  p_dynamic: false
  p_dynamic_use_piecewise: false
  p_dynamic_min_target_size: 0.0005   # normalized target size w*h, both in (0..1)
  p_dynamic_min: 0.6
  p_dynamic_max_target_size: 0.0120   # normalized target size
  p_dynamic_max: 6

  p_dynamic_stage_1_threshold: 0.01
  p_dynamic_stage_2_threshold: 0.05
  p_dynamic_stage_1_ratio: 1
  p_dynamic_stage_2_ratio: 1
  p_dynamic_stage_3_ratio: 1

  # Bleed off P as the airframe speeds up: a gain that is well-damped in a slow
  # approach is twitchy at speed. Above start_speed_ms:
  #     P *= coeff ** ((speed_ms - start_speed_ms) / speed_step_ms)
  # Speed is the 3D magnitude of odometry.velocity_body (descent rate included).
  # Applied LAST of all P modifications, then clamped into [p_min, p_max].
  # Optional sub-section: OMIT it entirely to disable.
  speed_reduction:
    enabled: true
    start_speed_ms: 15.0   # at or below this speed, P is untouched
    coeff: 0.947           # per-step multiplier, 0..1 (1.0 = no reduction)
    speed_step_ms: 1.0     # one reduction step, m/s

takeoff:
  delay_until_n_detection_frames: 10
  #TODO: change from nanoseconds to miliseconds
  duration_ns: 500000000           # initial "safe" takeoff window
  # starting from platform with guides, make sure that initial takeoff is almost perpendicular
  # and we don't hit the guides with props.
  pd_coeff_p: [0.1, 0.1]
  thrust: 1.0 # max speed just to get off the rails

# Multi-camera support. The shared caps (width/height/fps/video_format/
# active_id/switch_to_wide_size/switch_to_zoom_size) apply to ALL cameras (a
# single appsrc downstream demands identical caps). The 'cameras' list holds
# per-camera entries; the producer spawns one picamera thread per entry but
# only the camera with camera_id == active_id feeds inference at any moment.
camera:
  width: 1280
  height: 720
  fps: 30
  # video_format is auto-derived from the model input at startup (NV12-input hef
  # -> capture NV12, else RGB) and overrides this value; kept only as a fallback
  # if the HEF can't be inspected. The capture format MUST match the hef input.
  video_format: RGB
  active_id: 0
  # Relative target size (or bigger) that triggers switching to wide-angle camera.
  switch_to_wide_size: 0.25
  # Relative target size (or smaller) that triggers switching to narrow-angle (zoomed) camera.
  switch_to_zoom_size: 0.015

  # --- NORMAL / well-lit profile (default) ---
  autoexposure:
    exposure_auto_pin_ms: 500
    exposure_min_ms: 0
    exposure_max_ms: 10      # shutter <=10ms: ~5ms exposure-centering, big 30fps headroom
    gain_max: 16.0           # noise ceiling; only binds in dim light (ov5647 clamps to ~8x)
    exposure_time_ms: 0
    analogue_gain: 0.0

  # --- DIM / low-light profile --
  # autoexposure: #
  #   exposure_auto_pin_ms: 500
  #   exposure_min_ms: 0
  #   exposure_max_ms: 10
  #   gain_max: 22.0
  #   exposure_time_ms: 0
  #   analogue_gain: 0.0

  # Stage-A latency: picamera2 DMA pool depth. 2 = floor (keeps double-buffering;
  # lower worst-case capture staleness). Raise only if the sensor can't stream
  # cleanly at 2 (watch for libcamera "no buffers" warnings).
  buffer_count: 2
  cameras:
    # NOTE: must be at least 1 camera
    - camera_id: 0
      name: wide
      sensor_index: 0          # Picamera2 camera_num -> ov5647
      frame_angular_size_deg: [107, 85]
    # - camera_id: 1
    #   name: zoom
    #   sensor_index: 1          # Picamera2 camera_num -> imx477
    #   frame_angular_size_deg: [14, 8]

drone:
  # connection_string options:
  #   udpout://192.168.0.3:14540  - direct comm with drone, slow to start, fails to connect on client restart
  #   udp://:14550                - mavlink-routerd
  #   serial:///dev/serial/by-id/usb-Auterion_PX4_FMU_v6X.x_0-if00
  #   usb -- auto-discover USB device to use
  connection_string: usb
  config:
    upside_down_angle_deg: 130
    upside_down_hold_s: 0.2
    use_set_attitude: false
    min_lift_fraction: 0.1
    lift_velocity_headroom_ms: 3.0   # upward velocity when tilt angle restrictions are relaxed significantly
    lift_accel_headroom_mss: 5.0     # upward acceleration when tilt angle restrictions are relaxed significantly
    # Belly-down yaw assist: yaw the nose toward the ground using gravity dir.
    belly_down_yaw: true             # set false to disable
    belly_down_yaw_kp: 1.5           # deg/s per deg of heading error
    belly_down_yaw_max_rate_deg_s: 90.0   # clamp on commanded yaw rate
    belly_down_min_horizontal_g_mss: 2.0  # min in-plane gravity to engage

bytetrack:
  enabled: false   # set true to enable ByteTrack (section is still validated)
  track_thresh: 0.3
  det_thresh: 0.35
  match_thresh: 0.3
  track_buffer: 30
  frame_rate: 30
  match_max_dist: 0.2
  recovery_max_dist: null
  nms_thresh: 0.3
  nms_dist_thresh: 0.06

# Trace the decision pipeline into the PX4's own persistent ulog, so a crash that
# destroys the Pi's SD card still leaves a record of what we saw and what we
# commanded. One MAVLink DEBUG_FLOAT_ARRAY named "BDD" per tick; see ulog_trace.py
# for the slot layout.
#
# REQUIRES on the flight controller (one-time, needs an FC reboot to take effect):
#   SDLOG_PROFILE must have the Debug bit (32) set, or PX4 receives these and
#   silently discards them. The app checks and warns at startup; it never writes
#   flight-controller params itself.
ulog_trace:
  enabled: true
  # Records per second. Each record SUMMARISES the interval since the last one (counts,
  # a per-frame history, and the last viable detection), so lowering this loses
  # resolution, never whole frames.
  #   0    = uncapped: one record per control-loop iteration (one frame each).
  #   <=50 = every record is written by the FC in full.
  # Above ~195/s the PX4 logger silently discards most of them — see config.py.
  rate_hz: 5.0
