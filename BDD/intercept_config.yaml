# Interception controller configuration — single source of truth.
# Loaded by intercept_config.InterceptConfig; overridden per-run via --control-config JSON.
# XY-typed values (frame_angular_size_deg, target_size_m, etc.) are stored as [x, y] lists.
# app.py converts them back to XY objects after loading.

# --- detection confidence ---
confidence_min: 0.4
confidence_move: 0.3

# --- thrust ---
thrust_takeoff: 0.5          # keep takeoff gentle for a stable launch
thrust_min: 0.7              # in-flight thrust (thrust_dynamic=False => this is used)
thrust_max: 1.0              # MAX SPEED: full power ceiling
thrust_dynamic: false
thrust_proportional_to_target_size: false

# --- target tracking ---
target_lost_fade_per_frame: 0.99
target_estimator_clear_history_after_target_lost_frames: 6

# --- estimation ---
estimation_3d: true
estimation_3d_method: cluster
estimation_3d_use_initial_velocity: true
estimation_3d_max_distance_m: 25    # beyond this, fall back to 2D; null = always 3D

# --- estimation lookahead ---
estimation_lookahead_frames: 2
estimation_lookahead_dynamic: true
estimation_lookahead_dynamic_sqrt: true
estimation_lookahead_dynamic_factor: 0   # 0 disables; let sqrt mode govern
estimation_lookahead_dynamic_frames_near: 1
estimation_lookahead_dynamic_frames_medium: 1
estimation_lookahead_dynamic_frames_far: 1

# --- PD regulator ---
pd_coeff_p: 3
pd_coeff_d: 30
pd_coeff_p_safe_min: 0.6
pd_coeff_p_min: 0.5
pd_coeff_p_max: 10

# --- PD dynamic P ---
pd_coeff_p_dynamic: false
pd_coeff_p_dynamic_use_piecewise: false
pd_coeff_p_dynamic_min_target_size: 0.0005
pd_coeff_p_dynamic_min: 0.6
pd_coeff_p_dynamic_max_target_size: 0.012
pd_coeff_p_dynamic_max: 6
pd_coeff_p_dynamic_stage_1_threshold: 0.01
pd_coeff_p_dynamic_stage_2_threshold: 0.05
pd_coeff_p_dynamic_stage_1_ratio: 1
pd_coeff_p_dynamic_stage_2_ratio: 1
pd_coeff_p_dynamic_stage_3_ratio: 1

# --- optics / geometry ---
frame_angular_size_deg: [107, 85]   # XY — converted to XY in app.py
target_size_m: [3.0, 3.0]          # XY — red_sphere 3 m (Shahed-sized)
distance_scale: 1.0                 # empirical monocular range calibration
size_measure_contour: false         # measure target size via Otsu contour (not raw bbox) for ALL detections

# --- inertia correction ---
inertia_correction_gain: 0
inertia_correction_limits: [1, 1]   # XY
inertia_correction_min_speed_ms: 5

# --- takeoff ---
safe_takeoff_period_ns: 300000000
delay_takeof_until_n_detection_frames: 12

# --- aim point ---
aim_point: [0.5, 0.5]              # XY
aim_point_max_offset: [0.5, 0.6]   # XY

# --- guidance: mode flags ---
follow_target_position_ned: false

# --- guidance: pronav ---
guidance_pronav: false
pronav_closing_speed: 15.0
pronav_n: 1.0
pronav_v_max: 25.0
pronav_vz_max: 10.0
pronav_use_kalman: false
pronav_kalman_q: 1.0
pronav_kalman_r: 2.0

# --- guidance: visual ---
guidance_visual: false
visual_v_far: 12.0
visual_v_close: 14.0
visual_n_gain: 8.0
visual_term_gain: 16.0
visual_mid_thresh: 0.06
visual_near_thresh: 0.20
visual_v_max: 30.0
visual_climb_min: 3.0

# --- guidance: lead ---
guidance_lead: false
lead_speed: 12.0
lead_t_max: 4.0
lead_alt_offset: 0.0
lead_max_lat: 60.0
lead_max_alt_m: 70.0
lead_visual_terminal: false
lead_visual_dist: 12.0
lead_far_visual: false
lead_far_dist: 30.0

# --- drone controller params (drone_ prefix stripped before passing) ---
drone_use_set_attitude: false
drone_min_lift_fraction: 0.1
drone_lift_velocity_headroom_ms: 3.0
drone_lift_accel_headroom_mss: 5.0
drone_max_attitude_rate_deg_s: 120

# --- misc ---
DEBUG: false

# --- bytetrack ---
bytetrack_track_thresh: 0.3
bytetrack_det_thresh: 0.35
bytetrack_match_thresh: 0.3
bytetrack_track_buffer: 30
bytetrack_frame_rate: 30
bytetrack_match_max_dist: 0.2
bytetrack_recovery_max_dist: null
bytetrack_nms_thresh: 0.3
bytetrack_nms_dist_thresh: 0.06
bytetrack_target_lock: true

# --- guidance: phased (3-stage FAR->MID->CLOSE) ---
guidance_phased: false      # enable the 3-stage range-banded mode
phased_mid_dist: 35.0       # FAR->MID range threshold (m)
phased_far_vmax: 25.0       # FAR velocity command magnitude (m/s) — the speed lever
phased_far_speed: 25.0      # drone speed used in the FAR lead-point time-to-go solve
phased_far_vz_max: 10.0     # FAR vertical command cap (m/s)
phased_adaptive: false      # scale mid_dist/pronav_n/lead_t_max/closing by est target speed

# --- estimation: parallax range (size-independent, ego-motion two-ray) ---
parallax_range: false        # enable parallax range fused into the kalman
parallax_buffer: 15          # ring-buffer frames of (drone_pos, los, t)
parallax_min_baseline_m: 1.0 # min perpendicular baseline for usable parallax (m)
parallax_min_sin2: 0.02      # min sin^2(ray angle) (reject near-parallel rays)
parallax_max_miss_m: 8.0     # max ray-ray miss distance (reject inconsistent)
parallax_max_w: 0.7          # max blend weight toward the parallax point (vs size-range)
